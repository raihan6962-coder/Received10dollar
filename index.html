<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>💰 Received $10</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#f5c518;--gold2:#c9a414;--green:#22c55e;--red:#ef4444;
  --bg:#0d0d0f;--s1:#18181b;--s2:#27272a;--bdr:#3f3f46;
  --txt:#fafafa;--dim:#a1a1aa;--r:16px;--rs:10px;
}
html,body{min-height:100vh;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;color:var(--dim)}
.orb{width:56px;height:56px;border-radius:50%;background:radial-gradient(circle at 40% 40%,var(--gold),#a07d10);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
#app{display:none;flex-direction:column;min-height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:#111;border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:10}
.logo{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--gold)}
.uname{font-size:.82rem;color:var(--dim)}
main{flex:1;padding:20px 16px 60px;max-width:460px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:18px}
.bal-card{background:linear-gradient(135deg,#1c1a10,#1a1600);border:1px solid #4a3c00;border-radius:var(--r);padding:28px 24px 22px;text-align:center;position:relative;overflow:hidden}
.bal-card::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(245,197,24,.2),transparent 70%)}
.bal-lbl{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold2);margin-bottom:8px}
.bal-amt{display:flex;align-items:flex-start;justify-content:center;gap:2px}
.bal-sign{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:700;color:var(--gold);padding-top:8px}
.bal-num{font-family:'Syne',sans-serif;font-size:4.5rem;font-weight:800;color:var(--gold);line-height:1}
.prog-track{margin-top:18px;height:8px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
.prog-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gold2),var(--gold));transition:width .8s cubic-bezier(.34,1.56,.64,1)}
.prog-hint{font-size:.75rem;color:var(--dim);margin-top:10px}
.chips{display:flex;gap:10px}
.chip{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 8px;background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rs);font-size:.72rem;color:var(--dim);transition:all .25s}
.chip .ico{font-size:1.2rem}
.chip.done{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4);color:var(--green)}
.sec{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:20px 16px;display:flex;flex-direction:column;gap:14px}
.sec-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700}
.sec-sub{font-size:.8rem;color:var(--dim)}
.ads-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.ad-slot{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:.65rem;font-weight:600;cursor:pointer;background:var(--s2);border:1px solid var(--bdr);transition:transform .15s,background .2s;user-select:none;text-align:center;padding:4px}
.ad-slot.watched{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.4);color:var(--green);cursor:default}
.ad-slot.avail{background:rgba(245,197,24,.1);border-color:rgba(245,197,24,.4);color:var(--gold)}
.ad-slot.avail:active{transform:scale(.95)}
.ad-timer{font-size:1.1rem;font-weight:800;color:var(--gold)}
.ad-viewer{background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rs);overflow:hidden;margin-top:4px}
.ad-viewer-hdr{padding:10px 14px;font-size:.78rem;color:var(--dim);border-bottom:1px solid var(--bdr)}
.ad-content{padding:16px;min-height:100px;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:.8rem}
.ref-slots{display:flex;gap:10px}
.ref-slot{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border-radius:var(--rs);background:var(--s2);border:1px solid var(--bdr);font-size:.72rem;color:var(--dim)}
.ref-slot .ico{font-size:1.5rem}
.ref-slot.done{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4);color:var(--green)}
.ref-link{background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rs);padding:12px;word-break:break-all;font-size:.7rem;color:var(--dim);font-family:monospace}
.ref-hint{font-size:.72rem;color:var(--dim);text-align:center}
.btn{width:100%;padding:15px;border-radius:var(--rs);border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;transition:all .2s}
.btn-gold{background:var(--gold);color:#000}
.btn-gold:active{transform:scale(.98)}
.btn-green{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;font-size:1.05rem;padding:18px}
.btn-green:active{filter:brightness(.9)}
.btn-green:disabled{opacity:.5;cursor:not-allowed}
.btn-green.pulse{animation:gbtn 2s ease-in-out infinite}
@keyframes gbtn{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{box-shadow:0 0 0 14px rgba(34,197,94,0)}}
.btn-ghost{padding:10px 18px;border-radius:8px;background:transparent;border:1px solid var(--bdr);color:var(--txt);cursor:pointer;font-size:.85rem;transition:background .2s}
.notice{padding:14px 16px;border-radius:var(--rs);font-size:.83rem}
.notice-y{background:rgba(245,197,24,.12);border:1px solid rgba(245,197,24,.3);color:var(--gold)}
.notice-g{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:var(--green)}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--s2);border:1px solid var(--bdr);color:var(--gold);padding:12px 22px;border-radius:999px;font-size:.83rem;font-weight:600;z-index:200;opacity:0;transition:all .35s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:flex-end;justify-content:center;z-index:50;animation:fin .2s ease}
@keyframes fin{from{opacity:0}to{opacity:1}}
.modal{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r) var(--r) 0 0;padding:28px 20px 48px;width:100%;max-width:460px;position:relative;animation:sup .3s cubic-bezier(.34,1.56,.64,1);display:flex;flex-direction:column;gap:16px}
@keyframes sup{from{transform:translateY(80px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-x{position:absolute;top:14px;right:16px;background:var(--s2);border:none;color:var(--dim);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.85rem}
.modal-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800}
.inp{width:100%;padding:14px;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rs);color:var(--txt);font-size:.9rem;outline:none;transition:border-color .2s;resize:vertical;font-family:'DM Sans',sans-serif}
.inp:focus{border-color:var(--gold)}
.err{color:var(--red);font-size:.8rem}
.methods{display:flex;gap:10px}
.mth-btn{flex:1;padding:12px;border-radius:var(--rs);background:var(--s2);border:1px solid var(--bdr);color:var(--dim);cursor:pointer;font-size:.88rem;font-weight:600;transition:all .2s}
.mth-btn.active{background:rgba(245,197,24,.15);border-color:var(--gold);color:var(--gold)}
.success-box{display:flex;flex-direction:column;align-items:center;gap:12px;padding:20px 0;text-align:center}
.success-ico{font-size:3rem}
.success-box h3{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800}
.success-box p{color:var(--dim)}
/* Admin */
#admin-page{display:none;min-height:100vh;background:var(--bg)}
.adm-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.adm-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:36px 28px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:16px}
.adm-card h1{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800}
.adm-shell{display:flex;flex-direction:column;min-height:100vh}
.adm-hdr{padding:16px 20px;background:var(--s1);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:10;display:flex;flex-direction:column;gap:12px}
.adm-hdr h1{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800}
.adm-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px}
.adm-tab{padding:8px 16px;border-radius:8px;border:1px solid var(--bdr);background:transparent;color:var(--dim);cursor:pointer;font-size:.82rem;white-space:nowrap;transition:all .2s}
.adm-tab.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700}
.adm-main{padding:20px 16px;max-width:900px;margin:0 auto;width:100%}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
.stat-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:18px 14px;text-align:center;display:flex;flex-direction:column;gap:8px}
.stat-ico{font-size:1.8rem}
.stat-val{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--gold)}
.stat-lbl{font-size:.72rem;color:var(--dim)}
.tbl-wrap{overflow-x:auto;border-radius:var(--rs);border:1px solid var(--bdr)}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{padding:10px 12px;text-align:left;color:var(--dim);border-bottom:1px solid var(--bdr);white-space:nowrap;background:var(--s2)}
td{padding:10px 12px;border-bottom:1px solid rgba(63,63,70,.4);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:.7rem;font-weight:600}
.b-none{background:rgba(161,161,170,.15);color:var(--dim)}
.b-pending{background:rgba(245,197,24,.15);color:var(--gold)}
.b-completed{background:rgba(34,197,94,.15);color:var(--green)}
.b-rejected{background:rgba(239,68,68,.15);color:var(--red)}
.ad-form-box{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.ad-form-box h3{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem}
.form-row{display:flex;gap:10px;align-items:center}
.ad-item{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rs);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}
.ad-item-acts{display:flex;gap:8px;flex-shrink:0}
.btn-sm{padding:6px 12px;border-radius:8px;border:none;cursor:pointer;font-size:.78rem;font-weight:600;transition:background .2s}
.btn-sm-y{background:rgba(245,197,24,.15);color:var(--gold)}
.btn-sm-y:hover{background:rgba(245,197,24,.3)}
.btn-sm-r{background:rgba(239,68,68,.15);color:var(--red)}
.btn-sm-r:hover{background:rgba(239,68,68,.3)}
.btn-sm-g{background:rgba(34,197,94,.15);color:var(--green)}
.btn-sm-g:hover{background:rgba(34,197,94,.3)}
.empty-msg{color:var(--dim);font-size:.83rem;padding:30px 0;text-align:center}
.row-acts{display:flex;gap:6px}
</style>
</head>
<body>
<div id="loading"><div class="orb"></div><p style="font-size:.9rem">Loading your wallet…</p></div>
<div id="app">
  <header>
    <div class="logo">💰 Received $10</div>
    <div class="uname" id="uname"></div>
  </header>
  <main id="main"></main>
</div>
<div id="admin-page"></div>
<div id="toast"></div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const tg = window.Telegram?.WebApp;
let user = null, refLink = "", ads = [], adWatching = false, adTimer = null;

async function apiFetch(path, opts = {}) {
  // initData নিজে থেকে নাও — multiple ways try করো
  let initData = "";

  if (tg && tg.initData && tg.initData.length > 0) {
    initData = tg.initData;
  }

  const headers = {
    "Content-Type": "application/json",
  };

  if (initData) {
    headers["x-telegram-init-data"] = initData;
  }

  const res = await fetch(path, {
    method: opts.method || "GET",
    headers,
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });

  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Request failed");
  return data;
}

async function adminFetch(path, opts = {}, pw) {
  const res = await fetch(path, {
    method: opts.method || "GET",
    headers: { "Content-Type": "application/json", "x-admin-pw": pw, ...(opts.headers||{}) },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  return res.json();
}

function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 3000);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// BOOT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
window.addEventListener("DOMContentLoaded", async () => {
  tg?.ready();
  tg?.expand();

  if (window.location.pathname.startsWith("/admin")) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("admin-page").style.display = "block";
    renderAdminLogin();
    return;
  }

  // Wait a moment for Telegram to inject initData
  await new Promise(r => setTimeout(r, 500));

  if (!tg || !tg.initData || tg.initData.length === 0) {
    document.getElementById("loading").innerHTML = `
      <span style="font-size:2.5rem">⚠️</span>
      <p style="font-size:.95rem;color:#fafafa;margin-top:8px">Open this app via Telegram bot</p>
      <p style="font-size:.78rem;color:#a1a1aa;margin-top:4px">Tap the button in the bot to open</p>`;
    return;
  }

  try {
    const [meData, adsData, refData] = await Promise.all([
      apiFetch("/api/me"),
      apiFetch("/api/ads"),
      apiFetch("/api/referral-link")
    ]);
    user = meData;
    ads = adsData;
    refLink = refData.link;

    document.getElementById("loading").style.display = "none";
    document.getElementById("app").style.display = "flex";
    document.getElementById("uname").textContent = `Hi, ${user.firstName} 👋`;
    renderDashboard();
  } catch (e) {
    console.error("Boot error:", e);
    document.getElementById("loading").innerHTML = `
      <span style="font-size:2.5rem">⚠️</span>
      <p style="font-size:.95rem;color:#fafafa;margin-top:8px">${e.message}</p>
      <button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:var(--gold);border:none;border-radius:8px;cursor:pointer;font-weight:700">Try Again</button>`;
  }
});
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DASHBOARD
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderDashboard() {
  const u = user;
  const adsOk = u.adsWatched >= 5;
  const refOk = u.referralCount >= 3;
  const canW = adsOk && refOk;
  const pct = Math.min((u.balance / 10) * 100, 100);
  const withdrawn = u.withdrawStatus === "pending" || u.withdrawStatus === "completed";

  document.getElementById("main").innerHTML = `
    <div class="bal-card">
      <p class="bal-lbl">Your Balance</p>
      <div class="bal-amt">
        <span class="bal-sign">$</span>
        <span class="bal-num">${u.balance.toFixed(2)}</span>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      <p class="prog-hint">${pct < 100 ? `$${(10 - u.balance).toFixed(2)} more to go` : "🎉 Goal reached!"}</p>
    </div>

    <div class="chips">
      <div class="chip ${adsOk ? "done" : ""}"><span class="ico">📺</span><span>Ads ${u.adsWatched}/5</span></div>
      <div class="chip ${refOk ? "done" : ""}"><span class="ico">👥</span><span>Refs ${u.referralCount}/3</span></div>
      <div class="chip ${canW ? "done" : ""}"><span class="ico">💸</span><span>${u.withdrawStatus === "pending" ? "Pending" : u.withdrawStatus === "completed" ? "Paid ✓" : canW ? "Ready!" : "Locked"}</span></div>
    </div>

    ${!adsOk ? buildAdsSection(u) : ""}
    ${adsOk ? buildRefSection(u) : ""}

    ${canW && !withdrawn ? `<button class="btn btn-green pulse" id="w-btn">💸 Withdraw $10 Now</button>` : ""}
    ${u.withdrawStatus === "pending" ? `<div class="notice notice-y">⏳ Your withdrawal is being processed. We'll notify you soon!</div>` : ""}
    ${u.withdrawStatus === "completed" ? `<div class="notice notice-g">✅ Payment sent! Check your account.</div>` : ""}
  `;

  document.getElementById("w-btn")?.addEventListener("click", openWithdrawModal);
  bindAdSlots(u);
  bindShareBtn();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ADS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function buildAdsSection(u) {
  const slots = Array.from({length: 5}, (_, i) => {
    if (i < u.adsWatched) return `<div class="ad-slot watched">✅<span>+$2</span></div>`;
    if (i === u.adsWatched && ads.length > 0) return `<div class="ad-slot avail" data-idx="${i}">▶<span>Watch</span></div>`;
    return `<div class="ad-slot">🔒<span>$${(i+1)*2}</span></div>`;
  }).join("");

  return `
    <div class="sec">
      <h2 class="sec-title">📺 Watch Ads · Earn $2 Each</h2>
      <p class="sec-sub">Watch ${5 - u.adsWatched} more ad${5 - u.adsWatched !== 1 ? "s" : ""} to reach $10</p>
      <div class="ads-grid" id="ads-grid">${slots}</div>
      <div id="ad-viewer-wrap"></div>
      ${ads.length === 0 ? `<div class="notice notice-y">⏳ Ads coming soon. Check back later!</div>` : ""}
    </div>`;
}

function bindAdSlots(u) {
  document.querySelectorAll(".ad-slot.avail").forEach(slot => {
    slot.addEventListener("click", () => {
      if (adWatching) { showToast("Please wait for current ad to finish"); return; }
      const ad = ads[0];
      if (!ad) return;
      startAd(ad);
    });
  });
}

function startAd(ad) {
  adWatching = true;
  let cd = 15;
  const wrap = document.getElementById("ad-viewer-wrap");
  if (!wrap) return;

  wrap.innerHTML = `
    <div class="ad-viewer">
      <div class="ad-viewer-hdr">Ad playing… <strong id="cntdn">${cd}s</strong> remaining</div>
      <div class="ad-content" id="ad-inject">Loading ad…</div>
    </div>`;

  // Inject ad script
  const inject = document.getElementById("ad-inject");
  inject.innerHTML = "";
  const tmp = document.createElement("div");
  tmp.innerHTML = ad.script;
  tmp.querySelectorAll("script").forEach(s => {
    const ns = document.createElement("script");
    if (s.src) ns.src = s.src;
    ns.textContent = s.textContent;
    inject.appendChild(ns);
  });
  inject.appendChild(tmp);

  adTimer = setInterval(() => {
    cd--;
    const el = document.getElementById("cntdn");
    if (el) el.textContent = cd + "s";
    if (cd <= 0) { clearInterval(adTimer); completeAd(ad.id); }
  }, 1000);
}

async function completeAd(adId) {
  try {
    const res = await apiFetch("/api/watch-ad", { method: "POST", body: { adId } });
    user.adsWatched = res.adsWatched;
    user.balance = res.balance;
    showToast(`🎉 +$2 earned! Balance: $${res.balance.toFixed(2)}`);
  } catch (e) {
    showToast(e.message === "Already watched" ? "Ad already counted" : e.message);
  } finally {
    adWatching = false;
    renderDashboard();
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// REFERRAL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function buildRefSection(u) {
  const slots = [0, 1, 2].map(i => `
    <div class="ref-slot ${i < u.referralCount ? "done" : ""}">
      <span class="ico">${i < u.referralCount ? "✅" : "👤"}</span>
      <span>Friend ${i + 1}</span>
    </div>`).join("");

  return `
    <div class="sec">
      <h2 class="sec-title">👥 Invite Friends · Unlock Withdrawal</h2>
      <p class="sec-sub">${u.referralCount >= 3 ? "🎉 All referrals complete! You can withdraw now." : `Invite ${3 - u.referralCount} more friend${3 - u.referralCount !== 1 ? "s" : ""} to unlock your $10`}</p>
      <div class="ref-slots">${slots}</div>
      ${refLink ? `<div class="ref-link">${refLink}</div>` : ""}
      <button class="btn btn-gold" id="share-btn">🔗 Share Referral Link</button>
      <p class="ref-hint">Your friend must start the bot for the referral to count.</p>
    </div>`;
}

function bindShareBtn() {
  document.getElementById("share-btn")?.addEventListener("click", () => {
    if (tg && refLink) {
      tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(refLink)}&text=${encodeURIComponent("🎁 Join and earn FREE $10!")}`);
    } else {
      navigator.clipboard?.writeText(refLink).then(() => showToast("Link copied!"));
    }
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// WITHDRAW MODAL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openWithdrawModal() {
  let method = "bkash";
  const ov = document.createElement("div");
  ov.className = "overlay";
  ov.id = "ov";
  ov.innerHTML = `
    <div class="modal">
      <button class="modal-x" id="mx">✕</button>
      <h3 class="modal-title">💸 Withdraw $10</h3>
      <div class="methods">
        <button class="mth-btn active" id="m-bk">🏦 bKash</button>
        <button class="mth-btn" id="m-us">₮ USDT BEP20</button>
      </div>
      <input class="inp" id="w-acc" placeholder="bKash number (e.g. 01XXXXXXXXX)"/>
      <p class="err" id="w-err"></p>
      <button class="btn btn-green" id="w-go">Submit Withdrawal</button>
    </div>`;
  document.body.appendChild(ov);

  const setMethod = m => {
    method = m;
    ov.querySelector("#m-bk").classList.toggle("active", m === "bkash");
    ov.querySelector("#m-us").classList.toggle("active", m === "usdt");
    ov.querySelector("#w-acc").placeholder = m === "bkash" ? "bKash number (e.g. 01XXXXXXXXX)" : "BEP20 wallet address (0x...)";
  };

  ov.querySelector("#mx").onclick = () => ov.remove();
  ov.onclick = e => { if (e.target.id === "ov") ov.remove(); };
  ov.querySelector("#m-bk").onclick = () => setMethod("bkash");
  ov.querySelector("#m-us").onclick = () => setMethod("usdt");
  ov.querySelector("#w-go").onclick = async () => {
    const acc = ov.querySelector("#w-acc").value.trim();
    const errEl = ov.querySelector("#w-err");
    if (!acc) { errEl.textContent = "Please enter your account details"; return; }
    errEl.textContent = "";
    const btn = ov.querySelector("#w-go");
    btn.textContent = "Submitting…"; btn.disabled = true;
    try {
      await apiFetch("/api/withdraw", { method: "POST", body: { method, account: acc } });
      ov.querySelector(".modal").innerHTML = `
        <div class="success-box">
          <div class="success-ico">🎉</div>
          <h3>Withdrawal Submitted!</h3>
          <p>We'll process your $10 within 24 hours.</p>
          <button class="btn btn-gold" onclick="document.getElementById('ov').remove()">Done</button>
        </div>`;
      user.withdrawStatus = "pending";
      renderDashboard();
    } catch (e) {
      errEl.textContent = e.message;
      btn.textContent = "Submit Withdrawal"; btn.disabled = false;
    }
  };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ADMIN
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let adminPw = "", adminTab = "analytics";

function renderAdminLogin() {
  const pg = document.getElementById("admin-page");
  pg.innerHTML = `
    <div class="adm-login">
      <div class="adm-card">
        <h1>🔐 Admin Panel</h1>
        <p style="font-size:.83rem;color:var(--dim)">Enter password to continue</p>
        <input class="inp" type="password" id="pw-i" placeholder="Password"/>
        <button class="btn btn-gold" id="pw-b">Login</button>
      </div>
    </div>`;
  const go = () => {
    const v = document.getElementById("pw-i").value;
    if (v === "2808") { adminPw = v; renderAdminShell(); }
    else showToast("❌ Wrong password");
  };
  document.getElementById("pw-b").onclick = go;
  document.getElementById("pw-i").onkeydown = e => { if (e.key === "Enter") go(); };
}

function renderAdminShell() {
  const pg = document.getElementById("admin-page");
  const tabs = ["analytics", "users", "ads", "withdrawals"];
  pg.innerHTML = `
    <div class="adm-shell">
      <div class="adm-hdr">
        <h1>⚙️ Admin Dashboard</h1>
        <div class="adm-tabs">
          ${tabs.map(t => `<button class="adm-tab ${t === adminTab ? "active" : ""}" data-t="${t}">${t.charAt(0).toUpperCase() + t.slice(1)}</button>`).join("")}
        </div>
      </div>
      <div class="adm-main" id="adm-c">Loading…</div>
    </div>`;
  pg.querySelectorAll(".adm-tab").forEach(b => {
    b.onclick = () => {
      adminTab = b.dataset.t;
      pg.querySelectorAll(".adm-tab").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      loadTab();
    };
  });
  loadTab();
}

async function loadTab() {
  const el = document.getElementById("adm-c");
  if (!el) return;
  el.innerHTML = `<p style="color:var(--dim);padding:20px">Loading…</p>`;
  if (adminTab === "analytics") await tabAnalytics(el);
  else if (adminTab === "users") await tabUsers(el);
  else if (adminTab === "ads") await tabAds(el);
  else if (adminTab === "withdrawals") await tabWithdrawals(el);
}

async function tabAnalytics(el) {
  const d = await adminFetch("/api/admin/analytics", {}, adminPw);
  el.innerHTML = `<div class="stats-grid">
    ${[["👥","Total Users",d.totalUsers],["💰","Total Balance","$"+d.totalBalance],["📺","Ads Watched",d.totalAds],["⏳","Pending",d.pendingWithdraws],["✅","Paid Out",d.completedWithdraws]]
      .map(([i,l,v]) => `<div class="stat-card"><div class="stat-ico">${i}</div><div class="stat-val">${v}</div><div class="stat-lbl">${l}</div></div>`).join("")}
  </div>`;
}

async function tabUsers(el) {
  const users = await adminFetch("/api/admin/users", {}, adminPw);
  el.innerHTML = `<div class="tbl-wrap"><table>
    <thead><tr><th>Telegram ID</th><th>Name</th><th>Balance</th><th>Ads</th><th>Refs</th><th>Withdraw</th><th>Joined</th></tr></thead>
    <tbody>${users.map(u => `<tr>
      <td>${u.telegramId}</td>
      <td>${u.firstName}${u.username ? " @" + u.username : ""}</td>
      <td>$${(u.balance || 0).toFixed(2)}</td>
      <td>${u.adsWatched || 0}/5</td>
      <td>${u.referralCount || 0}/3</td>
      <td><span class="badge b-${u.withdrawStatus || "none"}">${u.withdrawStatus || "none"}</span></td>
      <td>${(u.createdAt || "").slice(0, 10)}</td>
    </tr>`).join("")}</tbody>
  </table></div>`;
}

async function tabAds(el) {
  const adsList = await adminFetch("/api/admin/ads", {}, adminPw);
  el.innerHTML = `
    <div class="ad-form-box">
      <h3 id="form-h">➕ Add New Ad</h3>
      <input class="inp" id="a-name" placeholder="Ad name (e.g. Monetag Banner 1)"/>
      <textarea class="inp" id="a-script" rows="4" placeholder="Paste Monetag script/embed code here"></textarea>
      <div class="form-row">
        <button class="btn btn-gold" id="a-save" style="flex:1;padding:12px;font-size:.9rem">Save Ad</button>
        <button class="btn-ghost" id="a-cancel" style="display:none">Cancel</button>
      </div>
    </div>
    <div id="a-list">
      ${adsList.length === 0 ? `<p class="empty-msg">No ads yet. Add one above.</p>` :
        adsList.map(a => `
        <div class="ad-item">
          <div><strong style="font-size:.85rem">${a.name}</strong> <span class="badge ${a.active ? "b-completed" : "b-none"}">${a.active ? "Active" : "Inactive"}</span></div>
          <div class="ad-item-acts">
            <button class="btn-sm btn-sm-y" onclick="doEditAd('${a.id}','${encodeURIComponent(a.name)}','${encodeURIComponent(a.script || "")}')">Edit</button>
            <button class="btn-sm btn-sm-r" onclick="doDeleteAd('${a.id}')">Delete</button>
          </div>
        </div>`).join("")}
    </div>`;

  let editId = null;

  document.getElementById("a-save").onclick = async () => {
    const name = document.getElementById("a-name").value.trim();
    const script = document.getElementById("a-script").value.trim();
    if (!name || !script) { showToast("Please fill in all fields"); return; }
    if (editId) {
      await adminFetch(`/api/admin/ads/${editId}`, { method: "PUT", body: { name, script } }, adminPw);
      showToast("✅ Ad updated!");
    } else {
      await adminFetch("/api/admin/ads", { method: "POST", body: { name, script } }, adminPw);
      showToast("✅ Ad added!");
    }
    editId = null;
    loadTab();
  };

  document.getElementById("a-cancel").onclick = () => {
    editId = null;
    document.getElementById("a-name").value = "";
    document.getElementById("a-script").value = "";
    document.getElementById("form-h").textContent = "➕ Add New Ad";
    document.getElementById("a-cancel").style.display = "none";
  };

  window.doEditAd = (id, name, script) => {
    editId = id;
    document.getElementById("a-name").value = decodeURIComponent(name);
    document.getElementById("a-script").value = decodeURIComponent(script);
    document.getElementById("form-h").textContent = "✏️ Edit Ad";
    document.getElementById("a-cancel").style.display = "block";
    document.querySelector(".ad-form-box").scrollIntoView({ behavior: "smooth" });
  };

  window.doDeleteAd = async (id) => {
    if (!confirm("Delete this ad?")) return;
    await adminFetch(`/api/admin/ads/${id}`, { method: "DELETE" }, adminPw);
    showToast("Deleted");
    loadTab();
  };
}

async function tabWithdrawals(el) {
  const list = await adminFetch("/api/admin/withdrawals", {}, adminPw);
  el.innerHTML = `<div class="tbl-wrap"><table>
    <thead><tr><th>User ID</th><th>Method</th><th>Account</th><th>Amount</th><th>Status</th><th>Date</th><th>Action</th></tr></thead>
    <tbody>${list.length === 0 ? `<tr><td colspan="7" style="text-align:center;color:var(--dim);padding:24px">No withdrawal requests yet.</td></tr>` :
      list.map(w => `<tr>
        <td>${w.userId}</td>
        <td>${w.method}</td>
        <td style="font-size:.75rem;max-width:140px;word-break:break-all">${w.account}</td>
        <td>$${w.amount}</td>
        <td><span class="badge b-${w.status}">${w.status}</span></td>
        <td>${(w.createdAt || "").slice(0, 10)}</td>
        <td>
          ${w.status === "pending" ? `
            <div class="row-acts">
              <button class="btn-sm btn-sm-g" onclick="doUpdateW('${w.id}','completed')">✅ Pay</button>
              <button class="btn-sm btn-sm-r" onclick="doUpdateW('${w.id}','rejected')">✕ Reject</button>
            </div>` : "—"}
        </td>
      </tr>`).join("")}
    </tbody>
  </table></div>`;

  window.doUpdateW = async (id, status) => {
    await adminFetch(`/api/admin/withdrawals/${id}`, { method: "PUT", body: { status } }, adminPw);
    showToast(status === "completed" ? "✅ Marked as paid!" : "Rejected");
    loadTab();
  };
}
</script>
</body>
</html>
