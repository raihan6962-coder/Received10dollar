<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>💰 Received $10</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#FBBF24;--gold2:#F59E0B;--gold3:#D97706;
  --green:#10B981;--green2:#059669;
  --red:#EF4444;--blue:#3B82F6;
  --bg:#0A0A0F;--bg2:#111118;--s1:#16161E;--s2:#1E1E2A;--s3:#252535;
  --bdr:#2E2E42;--bdr2:#3A3A52;
  --txt:#F8F8FF;--dim:#8B8BA8;--dim2:#6B6B88;
  --r:18px;--rs:12px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
}
html,body{min-height:100vh;background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}

/* LOADING */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px}
.loading-icon{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold3));display:flex;align-items:center;justify-content:center;font-size:2rem;animation:pulse 1.8s ease-in-out infinite;box-shadow:0 0 40px rgba(251,191,36,.3)}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 40px rgba(251,191,36,.3)}50%{transform:scale(1.08);box-shadow:0 0 60px rgba(251,191,36,.5)}}
.loading-txt{font-size:.95rem;color:var(--dim);font-weight:500;letter-spacing:.02em}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:rgba(10,10,15,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:10}
.logo{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:700;background:linear-gradient(135deg,var(--gold),#FDE68A);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.user-pill{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--bdr);border-radius:999px;padding:6px 14px 6px 8px}
.user-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold3));display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#000}
.user-name{font-size:.8rem;font-weight:600;color:var(--txt)}

main{flex:1;padding:20px 16px 80px;max-width:480px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:16px}

/* LOCK CARD */
.lock-card{background:linear-gradient(135deg,#1A1A2E,#16213E);border:1px solid #2D2D5E;border-radius:var(--r);padding:28px 20px;text-align:center;position:relative;overflow:hidden}
.lock-card::before{content:'';position:absolute;top:-50px;left:50%;transform:translateX(-50%);width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(251,191,36,.12),transparent 70%);pointer-events:none}
.lock-icon-wrap{width:64px;height:64px;border-radius:50%;background:rgba(251,191,36,.12);border:2px solid rgba(251,191,36,.3);display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 16px}
.lock-title{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;color:var(--txt);margin-bottom:6px}
.lock-sub{font-size:.82rem;color:var(--dim);line-height:1.5}
.balance-hidden{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:16px;padding:12px 20px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);border-radius:var(--rs)}
.balance-hidden .lock-ico{font-size:1.2rem}
.balance-hidden .balance-text{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:700;color:var(--gold);letter-spacing:.05em}

/* PROGRESS BAR */
.progress-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:20px}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.progress-title{font-size:.85rem;font-weight:600;color:var(--dim)}
.progress-pct{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;color:var(--gold)}
.track{height:10px;background:var(--s3);border-radius:999px;overflow:hidden}
.fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gold3),var(--gold));transition:width 1s cubic-bezier(.34,1.56,.64,1)}
.progress-steps{display:flex;justify-content:space-between;margin-top:10px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--s3)}
.step-dot.done{background:var(--gold)}

/* SECTION */
.sec{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;display:flex;flex-direction:column;gap:14px}
.sec-head{display:flex;align-items:center;gap:10px}
.sec-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.sec-icon.gold{background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.25)}
.sec-icon.green{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.25)}
.sec-icon.blue{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.25)}
.sec-info h2{font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;margin-bottom:2px}
.sec-info p{font-size:.76rem;color:var(--dim)}

/* TASK CARD */
.task-card{background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rs);padding:16px;display:flex;align-items:center;gap:14px;transition:all .25s}
.task-card.completed{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3)}
.task-card.locked{opacity:.5}
.task-icon{width:42px;height:42px;border-radius:10px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.task-info{flex:1;min-width:0}
.task-title{font-size:.87rem;font-weight:600;color:var(--txt);margin-bottom:3px}
.task-reward{font-size:.75rem;color:var(--gold);font-weight:600}
.task-status{font-size:.72rem;color:var(--green);font-weight:600}
.task-btn{padding:9px 16px;border-radius:var(--rs);border:none;cursor:pointer;font-size:.8rem;font-weight:700;font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap;flex-shrink:0}
.task-btn.start{background:linear-gradient(135deg,var(--gold2),var(--gold3));color:#000}
.task-btn.start:hover{filter:brightness(1.1)}
.task-btn.start:active{transform:scale(.97)}
.task-btn.done{background:rgba(16,185,129,.15);color:var(--green);cursor:default;border:1px solid rgba(16,185,129,.3)}
.task-btn.locked{background:var(--s3);color:var(--dim2);cursor:not-allowed}

/* AD VIEWER */
.ad-overlay{background:var(--s3);border:1px solid var(--bdr2);border-radius:var(--rs);overflow:hidden;margin-top:4px;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.ad-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--bdr)}
.ad-bar-label{font-size:.77rem;color:var(--dim);font-weight:500}
.ad-timer-badge{background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);color:var(--gold);padding:4px 12px;border-radius:999px;font-size:.8rem;font-weight:700}
.ad-content{padding:20px;min-height:120px;display:flex;align-items:center;justify-content:center}
.ad-placeholder{text-align:center;color:var(--dim);font-size:.82rem}

/* WITHDRAW BUTTON */
.btn-withdraw{width:100%;padding:18px;border-radius:var(--r);border:none;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;transition:all .25s;position:relative;overflow:hidden}
.btn-withdraw::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);pointer-events:none}
.btn-withdraw:hover{transform:translateY(-1px);box-shadow:0 8px 32px rgba(16,185,129,.35)}
.btn-withdraw:active{transform:scale(.98)}
.btn-withdraw.pulse{animation:gpulse 2.5s ease-in-out infinite}
@keyframes gpulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.4)}50%{box-shadow:0 0 0 16px rgba(16,185,129,0)}}

.btn-gold-full{width:100%;padding:15px;border-radius:var(--rs);border:none;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;background:linear-gradient(135deg,var(--gold2),var(--gold3));color:#000;transition:all .2s}
.btn-gold-full:hover{filter:brightness(1.08)}
.btn-gold-full:active{transform:scale(.98)}

/* NOTICE */
.notice{padding:14px 16px;border-radius:var(--rs);font-size:.82rem;font-weight:500;line-height:1.5}
.notice-y{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);color:var(--gold)}
.notice-g{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:var(--green)}
.notice-b{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:var(--blue)}

/* TOAST */
#toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--s2);border:1px solid var(--bdr2);color:var(--txt);padding:12px 24px;border-radius:999px;font-size:.83rem;font-weight:600;z-index:999;opacity:0;transition:all .35s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;z-index:100;animation:fin .2s ease}
@keyframes fin{from{opacity:0}to{opacity:1}}
.modal{background:var(--s1);border:1px solid var(--bdr);border-top:1px solid var(--bdr2);border-radius:24px 24px 0 0;padding:28px 20px 52px;width:100%;max-width:480px;position:relative;animation:mup .35s cubic-bezier(.34,1.56,.64,1);display:flex;flex-direction:column;gap:16px}
@keyframes mup{from{transform:translateY(100px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:40px;height:4px;background:var(--bdr2);border-radius:999px;margin:0 auto 8px}
.modal-x{position:absolute;top:18px;right:18px;background:var(--s2);border:1px solid var(--bdr);color:var(--dim);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-x:hover{background:var(--s3);color:var(--txt)}
.modal-title{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700}
.modal-sub{font-size:.83rem;color:var(--dim);line-height:1.5}
.inp{width:100%;padding:14px 16px;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rs);color:var(--txt);font-size:.9rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--dim2)}
.err{color:var(--red);font-size:.8rem;font-weight:500}
.methods{display:flex;gap:10px}
.mth-btn{flex:1;padding:13px;border-radius:var(--rs);background:var(--s2);border:1px solid var(--bdr);color:var(--dim);cursor:pointer;font-size:.85rem;font-weight:600;font-family:'Inter',sans-serif;transition:all .2s}
.mth-btn.active{background:rgba(251,191,36,.12);border-color:var(--gold);color:var(--gold)}
.success-box{display:flex;flex-direction:column;align-items:center;gap:14px;padding:24px 0;text-align:center}
.success-ico{font-size:3.5rem;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.success-box h3{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:700}
.success-box p{color:var(--dim);font-size:.85rem;line-height:1.5}

/* REFER POPUP — 3 friends needed */
.refer-popup-slots{display:flex;gap:10px;margin-top:4px}
.ref-ps{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border-radius:var(--rs);background:var(--s2);border:1px solid var(--bdr);font-size:.75rem;color:var(--dim);text-align:center}
.ref-ps .ico{font-size:1.4rem}
.ref-ps.done-slot{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--green)}

/* ADMIN */
#admin-page{display:none;min-height:100vh;background:var(--bg)}
.adm-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.adm-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:36px 28px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:16px}
.adm-card h1{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700}
.adm-shell{display:flex;flex-direction:column;min-height:100vh}
.adm-hdr{padding:16px 20px;background:var(--s1);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:10;display:flex;flex-direction:column;gap:12px}
.adm-hdr h1{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700}
.adm-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px}
.adm-tab{padding:8px 16px;border-radius:8px;border:1px solid var(--bdr);background:transparent;color:var(--dim);cursor:pointer;font-size:.82rem;font-family:'Inter',sans-serif;white-space:nowrap;transition:all .2s}
.adm-tab.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700}
.adm-main{padding:20px 16px;max-width:900px;margin:0 auto;width:100%}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
.stat-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:18px 14px;text-align:center;display:flex;flex-direction:column;gap:8px}
.stat-ico{font-size:1.8rem}
.stat-val{font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:800;color:var(--gold)}
.stat-lbl{font-size:.72rem;color:var(--dim)}
.tbl-wrap{overflow-x:auto;border-radius:var(--rs);border:1px solid var(--bdr)}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{padding:10px 12px;text-align:left;color:var(--dim);border-bottom:1px solid var(--bdr);white-space:nowrap;background:var(--s2)}
td{padding:10px 12px;border-bottom:1px solid rgba(46,46,66,.4);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:.7rem;font-weight:600}
.b-none{background:rgba(139,139,168,.15);color:var(--dim)}
.b-pending{background:rgba(251,191,36,.15);color:var(--gold)}
.b-completed{background:rgba(16,185,129,.15);color:var(--green)}
.b-rejected{background:rgba(239,68,68,.15);color:var(--red)}
.ad-form-box{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.ad-form-box h3{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.95rem}
.form-row{display:flex;gap:10px;align-items:center}
.ad-item{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rs);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}
.ad-item-acts{display:flex;gap:8px;flex-shrink:0}
.btn-sm{padding:6px 12px;border-radius:8px;border:none;cursor:pointer;font-size:.78rem;font-weight:600;font-family:'Inter',sans-serif;transition:background .2s}
.btn-sm-y{background:rgba(251,191,36,.15);color:var(--gold)}
.btn-sm-y:hover{background:rgba(251,191,36,.3)}
.btn-sm-r{background:rgba(239,68,68,.15);color:var(--red)}
.btn-sm-r:hover{background:rgba(239,68,68,.3)}
.btn-sm-g{background:rgba(16,185,129,.15);color:var(--green)}
.btn-sm-g:hover{background:rgba(16,185,129,.3)}
.empty-msg{color:var(--dim);font-size:.83rem;padding:30px 0;text-align:center}
.row-acts{display:flex;gap:6px}
.btn-ghost{padding:10px 18px;border-radius:8px;background:transparent;border:1px solid var(--bdr);color:var(--txt);cursor:pointer;font-size:.85rem;font-family:'Inter',sans-serif;transition:background .2s}
.btn-ghost:hover{background:var(--s2)}
</style>
</head>
<body>
<div id="loading">
  <div class="loading-icon">💰</div>
  <p class="loading-txt">Loading your wallet…</p>
</div>
<div id="app">
  <header>
    <div class="logo">💰 Received $10</div>
    <div class="user-pill">
      <div class="user-avatar" id="u-av">?</div>
      <span class="user-name" id="u-name">Loading…</span>
    </div>
  </header>
  <main id="main"></main>
</div>
<div id="admin-page"></div>
<div id="toast"></div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const tg = window.Telegram?.WebApp;
let user = null, refLink = "", ads = [], adWatching = false, adTimer = null;

// Static tasks — complete korle earn hobe
const TASK_DEFS = [
  { id: "task_join_channel", icon: "📢", title: "Join our Telegram Channel", reward: 2, type: "link", link: "https://t.me/yourchannel" },
  { id: "task_watch_ad1",    icon: "📺", title: "Watch Ad #1",               reward: 2, type: "ad",   adIdx: 0 },
  { id: "task_watch_ad2",    icon: "📺", title: "Watch Ad #2",               reward: 2, type: "ad",   adIdx: 1 },
  { id: "task_watch_ad3",    icon: "📺", title: "Watch Ad #3",               reward: 2, type: "ad",   adIdx: 2 },
  { id: "task_watch_ad4",    icon: "📺", title: "Watch Ad #4",               reward: 2, type: "ad",   adIdx: 3 },
];
// totalReward = 5 tasks × $2 = $10

async function apiFetch(path, opts = {}) {
  let initData = (tg && tg.initData && tg.initData.length > 0) ? tg.initData : "";
  const res = await fetch(path, {
    method: opts.method || "GET",
    headers: { "Content-Type": "application/json", ...(initData ? {"x-telegram-init-data": initData} : {}) },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Request failed");
  return data;
}

async function adminFetch(path, opts = {}, pw) {
  const res = await fetch(path, {
    method: opts.method || "GET",
    headers: { "Content-Type": "application/json", "x-admin-pw": pw, ...(opts.headers||{}) },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  return res.json();
}

function showToast(msg, emoji = "") {
  const el = document.getElementById("toast");
  el.textContent = emoji ? `${emoji} ${msg}` : msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 3200);
}

function getCompletedTasks() {
  if (!user) return [];
  return user.completedTasks || [];
}

function isTaskDone(taskId) {
  return getCompletedTasks().includes(taskId);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// BOOT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
window.addEventListener("DOMContentLoaded", async () => {
  tg?.ready();
  tg?.expand();

  if (window.location.pathname.startsWith("/admin")) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("admin-page").style.display = "block";
    renderAdminLogin();
    return;
  }

  await new Promise(r => setTimeout(r, 500));

  if (!tg || !tg.initData || tg.initData.length === 0) {
    document.getElementById("loading").innerHTML = `
      <span style="font-size:3rem">⚠️</span>
      <p style="font-size:.95rem;color:var(--txt);margin-top:12px;font-weight:600">Open this app via Telegram bot</p>
      <p style="font-size:.78rem;color:var(--dim);margin-top:6px">Tap the button in the bot to continue</p>`;
    return;
  }

  try {
    const [meData, adsData, refData] = await Promise.all([
      apiFetch("/api/me"),
      apiFetch("/api/ads"),
      apiFetch("/api/referral-link")
    ]);
    user = meData;
    ads = adsData;
    refLink = refData.link;

    const firstName = user.firstName || "User";
    document.getElementById("loading").style.display = "none";
    document.getElementById("app").style.display = "flex";
    document.getElementById("u-name").textContent = firstName;
    document.getElementById("u-av").textContent = firstName.charAt(0).toUpperCase();
    renderDashboard();
  } catch (e) {

// TASKS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderTasks() {
  const list = document.getElementById("task-list");
  if (!list) return;

  list.innerHTML = TASK_DEFS.map((task, idx) => {
    const done = isTaskDone(task.id);
    const prevDone = idx === 0 || isTaskDone(TASK_DEFS[idx - 1].id);
    const isLocked = !prevDone;
    const isAdTask = task.type === "ad";
    const adAvail = isAdTask && ads.length > task.adIdx;

    let btnHtml = "";
    if (done) {
      btnHtml = `<button class="task-btn done">✅ Done</button>`;
    } else if (isLocked) {
      btnHtml = `<button class="task-btn locked" disabled>🔒 Locked</button>`;
    } else if (isAdTask && !adAvail) {
      btnHtml = `<button class="task-btn locked" disabled>⏳ Soon</button>`;
    } else {
      btnHtml = `<button class="task-btn start" data-task-id="${task.id}" data-task-type="${task.type}" data-task-idx="${task.adIdx || 0}" data-task-link="${task.link || ''}">▶ Start</button>`;
    }

    return `
    <div class="task-card ${done ? 'completed' : isLocked ? 'locked' : ''}">
      <div class="task-icon">${task.icon}</div>
      <div class="task-info">
        <div class="task-title">${task.title}</div>
        ${done
          ? `<div class="task-status">+$${task.reward} earned ✓</div>`
          : `<div class="task-reward">Earn +$${task.reward}</div>`
        }
      </div>
      ${btnHtml}
    </div>`;
  }).join('');

  // Bind task buttons
  list.querySelectorAll(".task-btn.start").forEach(btn => {
    btn.addEventListener("click", () => {
      const taskId = btn.dataset.taskId;
      const taskType = btn.dataset.taskType;
      const taskIdx = parseInt(btn.dataset.taskIdx) || 0;
      const taskLink = btn.dataset.taskLink;

      if (taskType === "ad") {
        handleAdTask(taskId, taskIdx);
      } else if (taskType === "link") {
        handleLinkTask(taskId, taskLink);
      }
    });
  });
}

// Link task (e.g. join channel)
async function handleLinkTask(taskId, link) {
  if (tg && link) {
    tg.openTelegramLink(link);
  } else if (link) {
    window.open(link, "_blank");
  }
  // Mark as done after 3 seconds (user clicked the link)
  showToast("Opening… Task will complete in 3 seconds");
  setTimeout(async () => {
    await completeTask(taskId);
  }, 3000);
}

// Ad task
function handleAdTask(taskId, adIdx) {
  if (adWatching) { showToast("Please wait for current ad to finish"); return; }
  const ad = ads[adIdx];
  if (!ad) { showToast("No ad available right now"); return; }
  startAdTask(taskId, ad);
}

function startAdTask(taskId, ad) {
  adWatching = true;
  let cd = 15;

  // Remove old viewer
  const oldWrap = document.getElementById("ad-viewer-wrap");
  if (oldWrap) oldWrap.innerHTML = '';

  // Append viewer below tasks
  const wrap = document.getElementById("ad-viewer-wrap");
  if (!wrap) return;

  wrap.innerHTML = `
    <div class="ad-overlay">
      <div class="ad-bar">
        <span class="ad-bar-label">📺 Ad playing — wait to earn $2</span>
        <span class="ad-timer-badge" id="ad-cd">${cd}s</span>
      </div>
      <div class="ad-content" id="ad-inject">
        <div class="ad-placeholder">⏳ Loading ad…</div>
      </div>
    </div>`;

  // Inject Monetag/ad code safely using iframe or div
  const inject = document.getElementById("ad-inject");
  if (inject && ad.script) {
    inject.innerHTML = "";
    // Create a safe container for the ad
    const adContainer = document.createElement("div");
    adContainer.style.width = "100%";
    adContainer.style.minHeight = "100px";
    adContainer.style.display = "flex";
    adContainer.style.alignItems = "center";
    adContainer.style.justifyContent = "center";

    // Parse and inject scripts properly
    const temp = document.createElement("div");
    temp.innerHTML = ad.script;

    // First append non-script elements
    Array.from(temp.childNodes).forEach(node => {
      if (node.nodeName !== "SCRIPT") {
        adContainer.appendChild(node.cloneNode(true));
      }
    });
    inject.appendChild(adContainer);

    // Then execute scripts
    temp.querySelectorAll("script").forEach(s => {
      const ns = document.createElement("script");
      if (s.src) {
        ns.src = s.src;
        ns.async = true;
      } else {
        ns.textContent = s.textContent;
      }
      document.head.appendChild(ns);
    });
  }

  // Scroll to ad viewer
  wrap.scrollIntoView({ behavior: "smooth", block: "start" });

  adTimer = setInterval(() => {
    cd--;
    const el = document.getElementById("ad-cd");
    if (el) el.textContent = cd + "s";
    if (cd <= 0) {
      clearInterval(adTimer);
      adWatching = false;
      completeAdTask(taskId, ad.id);
    }
  }, 1000);
}

async function completeAdTask(taskId, adId) {
  try {
    const res = await apiFetch("/api/watch-ad", { method: "POST", body: { adId } });
    user.adsWatched = res.adsWatched;
    user.balance = res.balance;
    await completeTask(taskId, false); // skip balance update, already done
    showToast("+$2 earned! Keep going!", "🎉");
  } catch (e) {
    if (e.message === "Already watched" || e.message === "Max ads reached") {
      await completeTask(taskId, false);
      showToast("+$2 earned!", "🎉");
    } else {
      showToast(e.message);
      const wrap = document.getElementById("ad-viewer-wrap");
      if (wrap) wrap.innerHTML = '';
      renderDashboard();
    }
  }
}

async function completeTask(taskId, updateBalance = true) {
  // Mark task as completed locally
  if (!user.completedTasks) user.completedTasks = [];
  if (!user.completedTasks.includes(taskId)) {
    user.completedTasks.push(taskId);
    // Optionally sync to server
    try {
      await apiFetch("/api/complete-task", { method: "POST", body: { taskId } });
    } catch(e) {
      // If endpoint doesn't exist yet, just use local state
    }
    if (updateBalance) {
      user.balance = parseFloat((user.balance + 2).toFixed(2));
    }
  }
  renderDashboard();
}

            <div class="row-acts">
              <button class="btn-sm btn-sm-g" onclick="doUpdateW('${w.id}','completed')">✅ Pay</button>
              <button class="btn-sm btn-sm-r" onclick="doUpdateW('${w.id}','rejected')">✕ Reject</button>
            </div>` : "—"}
        </td>
      </tr>`).join("")}
    </tbody>
  </table></div>`;

  window.doUpdateW = async (id, status) => {
    await adminFetch(`/api/admin/withdrawals/${id}`, { method: "PUT", body: { status } }, adminPw);
    showToast(status === "completed" ? "✅ Marked as paid!" : "Rejected");
    loadTab();
  };
}
</script>
</body>
</html>
