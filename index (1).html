<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>💰 Received $10</title>

<!-- Telegram WebApp SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- ✅ Monetag SDK — MUST be in <head> -->
<script src="//whephiwhekas.com/sdk.js#3306501" data-zone="3306501" async></script>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#FBBF24;--gold2:#F59E0B;--gold3:#D97706;--gold-glow:rgba(251,191,36,.25);
  --green:#10B981;--green2:#059669;--green-glow:rgba(16,185,129,.25);
  --red:#EF4444;--blue:#60A5FA;
  --bg:#07070D;--bg2:#0D0D16;--s1:#12121C;--s2:#191926;--s3:#202030;
  --bdr:#2A2A40;--bdr2:#353550;
  --txt:#F0F0FF;--dim:#7878A0;--dim2:#505070;
  --r:20px;--rs:14px;--rb:10px;
}

html,body{min-height:100vh;background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ── LOADING ── */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:18px;background:var(--bg)}
.load-coin{width:80px;height:80px;border-radius:50%;background:conic-gradient(var(--gold),var(--gold2),var(--gold3),var(--gold));display:flex;align-items:center;justify-content:center;font-size:2.2rem;animation:spin 2s linear infinite,glow 2s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 30px var(--gold-glow)}50%{box-shadow:0 0 60px rgba(251,191,36,.5)}}
.load-txt{font-size:.9rem;color:var(--dim);font-weight:500}

/* ── APP SHELL ── */
#app{display:none;flex-direction:column;min-height:100vh}

/* ── HEADER ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;
  background:rgba(7,7,13,.9);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--bdr);
  position:sticky;top:0;z-index:50;
}
.logo{
  font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:800;
  background:linear-gradient(135deg,#FBBF24,#FDE68A,#F59E0B);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.user-chip{
  display:flex;align-items:center;gap:8px;
  background:var(--s2);border:1px solid var(--bdr);
  border-radius:999px;padding:5px 14px 5px 6px;
}
.user-av{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold3));
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;font-weight:800;color:#000;flex-shrink:0;
}
.user-nm{font-size:.8rem;font-weight:600;color:var(--txt);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── MAIN ── */
main{flex:1;padding:18px 14px 90px;max-width:500px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:14px}

/* ── BALANCE CARD ── */
.bal-card{
  background:linear-gradient(145deg,#111128,#0E0E22);
  border:1px solid #2A2A55;
  border-radius:var(--r);padding:24px 20px;
  position:relative;overflow:hidden;
}
.bal-card::before{
  content:'';position:absolute;
  top:-60px;right:-60px;
  width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(251,191,36,.15),transparent 70%);
  pointer-events:none;
}
.bal-card::after{
  content:'';position:absolute;
  bottom:-40px;left:-40px;
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(16,185,129,.08),transparent 70%);
  pointer-events:none;
}
.bal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.bal-label{font-size:.72rem;font-weight:600;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
.bal-badge{padding:4px 10px;border-radius:999px;background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);font-size:.7rem;font-weight:700;color:var(--green)}
.bal-amount{display:flex;align-items:flex-start;gap:3px;margin-bottom:16px}
.bal-sign{font-family:'Space Grotesk',sans-serif;font-size:1.8rem;font-weight:700;color:var(--gold);padding-top:6px;line-height:1}
.bal-num{font-family:'Space Grotesk',sans-serif;font-size:4rem;font-weight:800;color:var(--gold);line-height:1;letter-spacing:-.02em}
.bal-cents{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:700;color:var(--gold2);padding-top:14px;line-height:1}
.bal-goal-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.bal-goal-txt{font-size:.75rem;color:var(--dim)}
.bal-goal-pct{font-size:.75rem;font-weight:700;color:var(--gold)}
.bal-bar{height:8px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden}
.bal-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gold3),var(--gold));transition:width 1.2s cubic-bezier(.34,1.56,.64,1)}

/* ── CHIPS ROW ── */
.chips{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.chip{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:14px 8px;border-radius:var(--rs);
  background:var(--s1);border:1px solid var(--bdr);
  font-size:.7rem;color:var(--dim);font-weight:600;
  transition:all .25s;
}
.chip .ci{font-size:1.3rem}
.chip.done{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--green)}
.chip.active-chip{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.3);color:var(--gold)}

/* ── SECTION ── */
.sec{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;display:flex;flex-direction:column;gap:12px}
.sec-hd{display:flex;align-items:center;gap:10px;padding-bottom:4px;border-bottom:1px solid var(--bdr)}
.sec-ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.ico-gold{background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.2)}
.ico-green{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.2)}
.ico-blue{background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.2)}
.sec-hd-txt h2{font-family:'Space Grotesk',sans-serif;font-size:.92rem;font-weight:700;margin-bottom:2px}
.sec-hd-txt p{font-size:.74rem;color:var(--dim)}

/* ── TASK CARDS ── */
.task{
  display:flex;align-items:center;gap:12px;
  padding:14px;border-radius:var(--rs);
  background:var(--s2);border:1px solid var(--bdr);
  transition:all .25s;
}
.task.t-done{background:rgba(16,185,129,.07);border-color:rgba(16,185,129,.25)}
.task.t-locked{opacity:.45}
.task.t-active{border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.04)}
.task-ic{
  width:44px;height:44px;border-radius:12px;
  background:var(--s3);border:1px solid var(--bdr2);
  display:flex;align-items:center;justify-content:center;
  font-size:1.25rem;flex-shrink:0;
}
.task-body{flex:1;min-width:0}
.task-name{font-size:.85rem;font-weight:600;color:var(--txt);margin-bottom:3px;line-height:1.3}
.task-earn{font-size:.72rem;font-weight:700;color:var(--gold)}
.task-done-txt{font-size:.72rem;font-weight:700;color:var(--green)}
.t-btn{
  padding:9px 15px;border-radius:var(--rb);border:none;
  cursor:pointer;font-size:.78rem;font-weight:700;
  font-family:'Inter',sans-serif;
  transition:all .2s;white-space:nowrap;flex-shrink:0;
}
.t-btn-go{background:linear-gradient(135deg,var(--gold2),var(--gold3));color:#000}
.t-btn-go:active{transform:scale(.96)}
.t-btn-done{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3);cursor:default}
.t-btn-lock{background:var(--s3);color:var(--dim2);cursor:not-allowed}
.t-btn-wait{background:rgba(96,165,250,.15);color:var(--blue);border:1px solid rgba(96,165,250,.3);cursor:not-allowed}

/* ── AD VIEWER ── */
.ad-viewer{
  background:var(--s2);border:1px solid var(--bdr2);
  border-radius:var(--rs);overflow:hidden;
  animation:slideDown .3s ease;
}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.ad-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;background:rgba(0,0,0,.25);border-bottom:1px solid var(--bdr);
}
.ad-hdr-l{font-size:.78rem;color:var(--dim);font-weight:500}
.ad-timer{
  padding:5px 14px;border-radius:999px;
  background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.35);
  color:var(--gold);font-size:.82rem;font-weight:800;
  font-family:'Space Grotesk',sans-serif;
  min-width:52px;text-align:center;
}
.ad-body{padding:16px;min-height:80px;display:flex;align-items:center;justify-content:center}
.ad-loading{text-align:center;color:var(--dim);font-size:.82rem}
.ad-earning{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 16px;background:rgba(16,185,129,.07);border-top:1px solid rgba(16,185,129,.15);
  font-size:.78rem;color:var(--green);font-weight:600;
}

/* ── PROGRESS ── */
.prog-card{
  background:var(--s1);border:1px solid var(--bdr);
  border-radius:var(--r);padding:18px;
}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.prog-lbl{font-size:.8rem;font-weight:600;color:var(--dim)}
.prog-cnt{font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;color:var(--gold)}
.prog-bar{height:10px;background:var(--s3);border-radius:999px;overflow:hidden;margin-bottom:10px}
.prog-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gold3),var(--gold),#FDE68A);transition:width 1.2s cubic-bezier(.34,1.56,.64,1)}
.prog-dots{display:flex;justify-content:space-between}
.pd{width:10px;height:10px;border-radius:50%;background:var(--s3);border:2px solid var(--bdr);transition:all .4s}
.pd.pd-done{background:var(--gold);border-color:var(--gold2);box-shadow:0 0 8px var(--gold-glow)}
.pd.pd-cur{background:var(--gold2);border-color:var(--gold);animation:pdpulse 1.5s ease-in-out infinite}
@keyframes pdpulse{0%,100%{box-shadow:0 0 4px var(--gold-glow)}50%{box-shadow:0 0 14px rgba(251,191,36,.5)}}

/* ── BUTTONS ── */
.btn-w{
  width:100%;padding:18px;border-radius:var(--r);border:none;
  cursor:pointer;font-family:'Space Grotesk',sans-serif;
  font-size:1.05rem;font-weight:800;
  background:linear-gradient(135deg,var(--green),var(--green2));
  color:#fff;transition:all .25s;
  box-shadow:0 4px 20px rgba(16,185,129,.3);
}
.btn-w:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(16,185,129,.4)}
.btn-w:active{transform:scale(.98)}
.btn-w.pulse{animation:gpulse 2.5s ease-in-out infinite}
@keyframes gpulse{0%,100%{box-shadow:0 0 0 0 var(--green-glow)}50%{box-shadow:0 0 0 18px rgba(16,185,129,0)}}

.btn-gold{
  width:100%;padding:14px;border-radius:var(--rs);border:none;
  cursor:pointer;font-family:'Space Grotesk',sans-serif;
  font-size:.92rem;font-weight:700;
  background:linear-gradient(135deg,var(--gold2),var(--gold3));
  color:#000;transition:all .2s;
}
.btn-gold:active{transform:scale(.98)}

/* ── NOTICE ── */
.notice{padding:14px 16px;border-radius:var(--rs);font-size:.82rem;font-weight:500;line-height:1.6}
.n-y{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);color:var(--gold)}
.n-g{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:var(--green)}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:30px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--s2);border:1px solid var(--bdr2);
  color:var(--txt);padding:11px 22px;border-radius:999px;
  font-size:.82rem;font-weight:600;z-index:999;
  opacity:0;transition:all .35s;pointer-events:none;
  white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5);
  max-width:90vw;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── MODAL ── */
.ov{
  position:fixed;inset:0;
  background:rgba(0,0,0,.8);backdrop-filter:blur(6px);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:100;animation:fin .2s ease;
}
@keyframes fin{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--s1);border:1px solid var(--bdr);
  border-radius:24px 24px 0 0;
  padding:24px 18px 50px;
  width:100%;max-width:500px;
  position:relative;
  animation:mup .35s cubic-bezier(.34,1.56,.64,1);
  display:flex;flex-direction:column;gap:14px;
}
@keyframes mup{from{transform:translateY(100px);opacity:0}to{transform:translateY(0);opacity:1}}
.m-handle{width:36px;height:4px;background:var(--bdr2);border-radius:999px;margin:0 auto 6px}
.m-x{
  position:absolute;top:18px;right:16px;
  background:var(--s2);border:1px solid var(--bdr);
  color:var(--dim);width:32px;height:32px;border-radius:50%;
  cursor:pointer;font-size:.85rem;transition:all .2s;
  display:flex;align-items:center;justify-content:center;
}
.m-x:hover{background:var(--s3);color:var(--txt)}
.m-title{font-family:'Space Grotesk',sans-serif;font-size:1.25rem;font-weight:700}
.m-sub{font-size:.82rem;color:var(--dim);line-height:1.6}
.inp{
  width:100%;padding:14px 16px;
  background:var(--s2);border:1px solid var(--bdr);
  border-radius:var(--rs);color:var(--txt);
  font-size:.88rem;font-family:'Inter',sans-serif;
  outline:none;transition:border-color .2s;
}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--dim2)}
.err{color:var(--red);font-size:.78rem;font-weight:500}
.meths{display:flex;gap:10px}
.mth{
  flex:1;padding:12px;border-radius:var(--rs);
  background:var(--s2);border:1px solid var(--bdr);
  color:var(--dim);cursor:pointer;
  font-size:.85rem;font-weight:600;font-family:'Inter',sans-serif;
  transition:all .2s;
}
.mth.on{background:rgba(251,191,36,.12);border-color:var(--gold);color:var(--gold)}
.succ{display:flex;flex-direction:column;align-items:center;gap:12px;padding:20px 0;text-align:center}
.succ-ic{font-size:3.5rem;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.succ h3{font-family:'Space Grotesk',sans-serif;font-size:1.35rem;font-weight:800}
.succ p{color:var(--dim);font-size:.83rem;line-height:1.6}

/* REF SLOTS */
.ref-row{display:flex;gap:10px}
.ref-sl{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:14px 8px;border-radius:var(--rs);
  background:var(--s2);border:1px solid var(--bdr);
  font-size:.74rem;color:var(--dim);text-align:center;
}
.ref-sl.sl-done{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3);color:var(--green)}

/* ── ADMIN ── */
#admin-page{display:none;min-height:100vh;background:var(--bg)}
.adm-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.adm-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:36px 28px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:16px}
.adm-card h1{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:800}
.adm-shell{display:flex;flex-direction:column;min-height:100vh}
.adm-hdr{padding:14px 18px;background:var(--s1);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:10;display:flex;flex-direction:column;gap:10px}
.adm-hdr h1{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700}
.adm-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px}
.adm-tab{padding:8px 16px;border-radius:8px;border:1px solid var(--bdr);background:transparent;color:var(--dim);cursor:pointer;font-size:.8rem;font-family:'Inter',sans-serif;white-space:nowrap;transition:all .2s}
.adm-tab.on{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700}
.adm-main{padding:18px 14px;max-width:900px;margin:0 auto;width:100%}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.sc{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:16px 12px;text-align:center;display:flex;flex-direction:column;gap:8px}
.sc-i{font-size:1.7rem}
.sc-v{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:800;color:var(--gold)}
.sc-l{font-size:.7rem;color:var(--dim)}
.tbl{overflow-x:auto;border-radius:var(--rs);border:1px solid var(--bdr)}
table{width:100%;border-collapse:collapse;font-size:.78rem}
th{padding:10px 12px;text-align:left;color:var(--dim);border-bottom:1px solid var(--bdr);white-space:nowrap;background:var(--s2)}
td{padding:10px 12px;border-bottom:1px solid rgba(42,42,64,.5);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
.badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:.68rem;font-weight:700}
.b-none{background:rgba(120,120,160,.15);color:var(--dim)}
.b-pending{background:rgba(251,191,36,.15);color:var(--gold)}
.b-completed{background:rgba(16,185,129,.15);color:var(--green)}
.b-rejected{background:rgba(239,68,68,.15);color:var(--red)}
.adfb{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.adfb h3{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.9rem}
.adfb p{font-size:.75rem;color:var(--dim);line-height:1.5}
.ad-item{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rs);padding:13px 15px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}
.ad-acts{display:flex;gap:8px;flex-shrink:0}
.bs{padding:6px 12px;border-radius:8px;border:none;cursor:pointer;font-size:.76rem;font-weight:600;font-family:'Inter',sans-serif;transition:background .2s}
.bs-y{background:rgba(251,191,36,.15);color:var(--gold)}.bs-y:hover{background:rgba(251,191,36,.3)}
.bs-r{background:rgba(239,68,68,.15);color:var(--red)}.bs-r:hover{background:rgba(239,68,68,.3)}
.bs-g{background:rgba(16,185,129,.15);color:var(--green)}.bs-g:hover{background:rgba(16,185,129,.3)}
.empty{color:var(--dim);font-size:.82rem;padding:28px 0;text-align:center}
.row-acts{display:flex;gap:6px}
.btn-ghost{padding:10px 16px;border-radius:8px;background:transparent;border:1px solid var(--bdr);color:var(--txt);cursor:pointer;font-size:.83rem;font-family:'Inter',sans-serif;transition:background .2s}
.btn-ghost:hover{background:var(--s2)}
</style>
</head>
<body>

<div id="loading">
  <div class="load-coin">💰</div>
  <p class="load-txt">Loading your wallet…</p>
</div>

<div id="app">
  <header>
    <div class="logo">💰 Received $10</div>
    <div class="user-chip">
      <div class="user-av" id="u-av">?</div>
      <span class="user-nm" id="u-nm">…</span>
    </div>
  </header>
  <main id="main"></main>
</div>

<div id="admin-page"></div>
<div id="toast"></div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// GLOBALS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const tg = window.Telegram?.WebApp;

async function api(path, opts = {}) {
  const initData = tg?.initData || "";
  const res = await fetch(path, {
    method: opts.method || "GET",
    headers: {
      "Content-Type": "application/json",
      ...(initData ? { "x-telegram-init-data": initData } : {})
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Request failed");
  return data;
}

async function adminApi(path, opts = {}, pw) {
  const res = await fetch(path, {
    method: opts.method || "GET",
    headers: { "Content-Type": "application/json", "x-admin-pw": pw, ...(opts.headers||{}) },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  return res.json();
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove("show"), 3000);
}

function doneTasks() { return user?.completedTasks || []; }
function isTaskDone(id) { return doneTasks().includes(id); }

        <div class="sec-hd-txt">

      <div id="task-list"></div>
    </div>

    ${canW && !withdrew ? `<button class="btn-w pulse" id="w-btn">💸 Withdraw $10 Now</button>` : ''}
    ${u.withdrawStatus==="pending" ? `<div class="notice n-y">⏳ Withdrawal processing… We'll notify you within 24 hours.</div>` : ''}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TASKS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderTasks() {
  const el = document.getElementById("task-list");
  if (!el) return;

  el.innerHTML = TASKS.map((t, i) => {
    const done = isTaskDone(t.id);
    const prevOk = i === 0 || isTaskDone(TASKS[i-1].id);
    const locked = !prevOk;
    const isAdTask = t.type === "ad";
    const adAvail = isAdTask && serverAds.length > (t.adIdx || 0);

    let btn = "";
    if (done)        btn = `<button class="t-btn t-btn-done">✅ Done</button>`;
    else if (locked) btn = `<button class="t-btn t-btn-lock" disabled>🔒 Locked</button>`;
    else if (isAdTask && !adAvail) btn = `<button class="t-btn t-btn-wait" disabled>⏳ Soon</button>`;
    else             btn = `<button class="t-btn t-btn-go" data-id="${t.id}" data-type="${t.type}" data-idx="${t.adIdx||0}" data-link="${t.link||''}">▶ Start</button>`;

    return `
    <div class="task ${done?'t-done':locked?'t-locked':!done&&!locked?'t-active':''}">
      <div class="task-ic">${t.icon}</div>
      <div class="task-body">
        <div class="task-name">${t.name}</div>
        ${done
          ? `<div class="task-done-txt">+$${t.earn} earned ✓</div>`
          : `<div class="task-earn">Earn +$${t.earn}</div>`}
      </div>
      ${btn}
    </div>`;
  }).join('');

  el.querySelectorAll(".t-btn-go").forEach(b => {
    b.addEventListener("click", () => {
      if (b.dataset.type === "ad") startAdTask(b.dataset.id, parseInt(b.dataset.idx));
      else handleLinkTask(b.dataset.id, b.dataset.link);
    });
  });
}

// LINK TASK
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function handleLinkTask(taskId, link) {
  if (tg && link) tg.openTelegramLink(link);
  else if (link) window.open(link, "_blank");
  toast("✅ Opening… completing in 3s");
  setTimeout(() => finishTask(taskId, true), 3000);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// AD TASK — Monetag Rewarded Interstitial
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function startAdTask(taskId, adIdx) {
  if (adWatching) { toast("⏳ Please wait for current ad to finish"); return; }

  adWatching = true;
  toast("📺 Loading ad…");

  // ✅ Call Monetag Rewarded Interstitial
  // show_10900582() is loaded from the Monetag SDK in <head>
  if (typeof show_10900582 === "function") {
    show_10900582()
      .then(() => {
        // User watched the ad — reward them
        adWatching = false;
        toast("🎉 +$2 earned!");
        syncAdToServer(taskId, adIdx);
      })
      .catch((e) => {
        // Ad closed / error — still give reward (user attempted)
        adWatching = false;
        console.log("Monetag ad result:", e);
        syncAdToServer(taskId, adIdx);
      });
  } else {
    // Fallback: SDK not loaded yet, show timer-based ad viewer
    adWatching = false;
    startFallbackAd(taskId, adIdx);
  }
}

// Server-side ad log + task completion
async function syncAdToServer(taskId, adIdx) {
  try {
    // Try to log ad watch
    const ad = serverAds[adIdx];
    if (ad) {
      try {
        const res = await api("/api/watch-ad", { method: "POST", body: { adId: ad.id } });
        user.adsWatched = res.adsWatched;
        user.balance = res.balance;
      } catch(e) {
        if (e.message !== "Already watched" && e.message !== "Max ads reached") {
          console.log("watch-ad:", e.message);
        }
      }
    }
    await finishTask(taskId, false);
  } catch(e) {
    console.log("syncAdToServer:", e.message);
    await finishTask(taskId, false);
  }
}

// Fallback ad viewer (timer-based) when Monetag SDK not ready
function startFallbackAd(taskId, adIdx) {
  adWatching = true;
  let cd = 15;

  const wrap = document.getElementById("ad-wrap");
  if (!wrap) return;

  wrap.innerHTML = `
    <div class="ad-viewer">
      <div class="ad-hdr">
        <span class="ad-hdr-l">📺 Ad playing — wait to earn $2</span>
        <span class="ad-timer" id="adcd">${cd}s</span>
      </div>
      <div class="ad-body">
        <div class="ad-loading">⏳ Ad loading…<br/><span style="font-size:.72rem;color:var(--dim2);margin-top:6px;display:block">Please wait ${cd} seconds</span></div>
      </div>
      <div class="ad-earning">💰 You'll earn <strong>+$2</strong> when this ad finishes</div>
    </div>`;

  wrap.scrollIntoView({ behavior: "smooth", block: "start" });

  adTimer = setInterval(() => {
    cd--;
    const el = document.getElementById("adcd");
    if (el) el.textContent = cd + "s";
    if (cd <= 0) {
      clearInterval(adTimer);
      adWatching = false;
      wrap.innerHTML = '';
      syncAdToServer(taskId, adIdx);
    }
  }, 1000);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// COMPLETE TASK
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function finishTask(taskId, addBalance = true) {
  if (!user.completedTasks) user.completedTasks = [];
  if (user.completedTasks.includes(taskId)) { render(); return; }

  user.completedTasks.push(taskId);
  if (addBalance) user.balance = parseFloat((user.balance + 2).toFixed(2));

  // Sync to server
  try {
    const res = await api("/api/complete-task", { method: "POST", body: { taskId } });
    if (res.balance !== undefined) user.balance = res.balance;
    if (res.completedTasks) user.completedTasks = res.completedTasks;
  } catch(e) {
    console.log("complete-task:", e.message);
  }

  const doneCount = user.completedTasks.length;
  if (doneCount >= TASKS.length) {
    toast("🎉 All tasks done! You can now withdraw $10!");
  } else {
    toast(`✅ Task done! +$2 earned (${doneCount}/${TASKS.length})`);
  }
  render();
}

// Withdraw modal

  let method = "bkash";
  const ov = mkOv();
  ov.innerHTML = `
    <div class="modal">
      <div class="m-handle"></div>
      <button class="m-x" onclick="this.closest('.ov').remove()">✕</button>
      <h3 class="m-title">💸 Withdraw $10</h3>
      <p class="m-sub">Choose your payment method and enter your account number or wallet address.</p>
      <div class="meths">
        <button class="mth on" id="mbk">🏦 bKash</button>
        <button class="mth" id="mus">₮ USDT BEP20</button>
      </div>
      <input class="inp" id="wacc" placeholder="bKash number (e.g. 01XXXXXXXXX)"/>
      <p class="err" id="werr"></p>
      <button class="btn-w" id="wgo">Submit Withdrawal Request</button>
    </div>`;
  document.body.appendChild(ov);

  const setM = m => {
    method = m;
    ov.querySelector("#mbk").classList.toggle("on", m==="bkash");
    ov.querySelector("#mus").classList.toggle("on", m==="usdt");
    ov.querySelector("#wacc").placeholder = m==="bkash" ? "bKash number (e.g. 01XXXXXXXXX)" : "BEP20 wallet address (0x...)";
  };
  ov.querySelector("#mbk").onclick = () => setM("bkash");
  ov.querySelector("#mus").onclick = () => setM("usdt");
  ov.onclick = e => { if (e.target === ov) ov.remove(); };
  ov.querySelector("#wgo").onclick = async () => {
    const acc = ov.querySelector("#wacc").value.trim();
    const errEl = ov.querySelector("#werr");
    if (!acc) { errEl.textContent = "Please enter your account details."; return; }
    errEl.textContent = "";
    const btn = ov.querySelector("#wgo");
    btn.textContent = "Submitting…"; btn.disabled = true;
    try {
      await api("/api/withdraw", { method:"POST", body:{ method, account:acc } });
      ov.querySelector(".modal").innerHTML = `
        <div class="succ">
          <div class="succ-ic">🎉</div>
          <h3>Withdrawal Submitted!</h3>
          <p>Your $10 will be processed within 24 hours.<br/>We'll notify you when it's sent!</p>
          <button class="btn-gold" style="margin-top:8px" onclick="this.closest('.ov').remove()">Done</button>

      render();
    } catch(e) {
      errEl.textContent = e.message;
      btn.textContent = "Submit Withdrawal Request"; btn.disabled = false;
    }
  };
}

function mkOv() {
  const d = document.createElement("div");
  d.className = "ov";
  return d;
}

    else toast("❌ Wrong password");
  };
  document.getElementById("pwb").onclick = go;
  document.getElementById("pwi").onkeydown = e => { if(e.key==="Enter") go(); };
}

function renderAdminShell() {
  const pg = document.getElementById("admin-page");
  const tabs = ["analytics","users","ads","withdrawals"];
  pg.innerHTML = `
    <div class="adm-shell">
      <div class="adm-hdr">
        <h1>⚙️ Admin Dashboard</h1>
        <div class="adm-tabs">
          ${tabs.map(t=>`<button class="adm-tab ${t===atab?'on':''}" data-t="${t}">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}
        </div>
      </div>
      <div class="adm-main" id="admc">Loading…</div>
    </div>`;
  pg.querySelectorAll(".adm-tab").forEach(b => {
    b.onclick = () => {
      atab = b.dataset.t;
      pg.querySelectorAll(".adm-tab").forEach(x => x.classList.remove("on"));
      b.classList.add("on");
      loadAdmTab();
    };
  });
  loadAdmTab();
}

async function loadAdmTab() {
  const el = document.getElementById("admc");
  if (!el) return;
  el.innerHTML = `<p style="color:var(--dim);padding:20px">Loading…</p>`;
  if (atab==="analytics") await admAnalytics(el);
  else if (atab==="users") await admUsers(el);
  else if (atab==="ads") await admAds(el);
  else if (atab==="withdrawals") await admWd(el);
}

async function admAnalytics(el) {
  const d = await adminApi("/api/admin/analytics", {}, apw);
  el.innerHTML = `<div class="stats-grid">
    ${[["👥","Total Users",d.totalUsers],["💰","Total Balance","$"+d.totalBalance],["📺","Ads Watched",d.totalAds],["⏳","Pending",d.pendingWithdraws],["✅","Paid Out",d.completedWithdraws]]
      .map(([i,l,v])=>`<div class="sc"><div class="sc-i">${i}</div><div class="sc-v">${v}</div><div class="sc-l">${l}</div></div>`).join('')}
  </div>`;
}

async function admUsers(el) {
  const users = await adminApi("/api/admin/users",{},apw);
  el.innerHTML = `<div class="tbl"><table>
    <thead><tr><th>TG ID</th><th>Name</th><th>Balance</th><th>Tasks</th><th>Refs</th><th>Withdraw</th><th>Joined</th></tr></thead>
    <tbody>${users.map(u=>`<tr>
      <td>${u.telegramId}</td>
      <td>${u.firstName}${u.username?" @"+u.username:""}</td>
      <td>$${(u.balance||0).toFixed(2)}</td>
      <td>${(u.completedTasks||[]).length}/${TASKS.length}</td>
      <td>${u.referralCount||0}/3</td>
      <td><span class="badge b-${u.withdrawStatus||"none"}">${u.withdrawStatus||"none"}</span></td>
      <td>${(u.createdAt||"").slice(0,10)}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

async function admAds(el) {
  const list = await adminApi("/api/admin/ads",{},apw);
  el.innerHTML = `
    <div class="adfb">
      <h3 id="afh">➕ Add New Ad</h3>
      <p>Paste your <strong>Monetag script code</strong> (the <code>show_XXXXXXX()</code> call) or any ad embed code. The SDK tag is already added in &lt;head&gt; — just paste the <em>call code</em> here.</p>
      <input class="inp" id="anam" placeholder="Ad name (e.g. Monetag Rewarded #1)"/>
      <textarea class="inp" id="ascr" rows="4" placeholder="e.g.  show_10900582().then(()=>{})"></textarea>
      <div style="display:flex;gap:10px">
        <button class="btn-gold" id="asav" style="flex:1;padding:12px;font-size:.88rem">Save Ad</button>
        <button class="btn-ghost" id="acan" style="display:none">Cancel</button>
      </div>
    </div>
    <div id="alist">
      ${list.length===0?`<p class="empty">No ads yet. Add one above.</p>`:
        list.map(a=>`
        <div class="ad-item">
          <div><strong style="font-size:.83rem">${a.name}</strong> <span class="badge ${a.active?'b-completed':'b-none'}">${a.active?'Active':'Inactive'}</span></div>
          <div class="ad-acts">
            <button class="bs bs-y" onclick="aEdit('${a.id}','${encodeURIComponent(a.name)}','${encodeURIComponent(a.script||'')}')">Edit</button>
            <button class="bs bs-r" onclick="aDel('${a.id}')">Delete</button>
          </div>
        </div>`).join('')}
    </div>`;

  let eid = null;
  document.getElementById("asav").onclick = async () => {
    const nm = document.getElementById("anam").value.trim();
    const sc = document.getElementById("ascr").value.trim();
    if (!nm||!sc){toast("Fill in all fields");return;}
    if (eid) {
      await adminApi(`/api/admin/ads/${eid}`,{method:"PUT",body:{name:nm,script:sc}},apw);
      toast("✅ Ad updated!");
    } else {
      await adminApi("/api/admin/ads",{method:"POST",body:{name:nm,script:sc}},apw);
      toast("✅ Ad added!");
    }
    eid=null; loadAdmTab();
  };
  document.getElementById("acan").onclick = () => {
    eid=null;
    document.getElementById("anam").value="";
    document.getElementById("ascr").value="";
    document.getElementById("afh").textContent="➕ Add New Ad";
    document.getElementById("acan").style.display="none";
  };
  window.aEdit = (id,nm,sc) => {
    eid=id;
    document.getElementById("anam").value=decodeURIComponent(nm);
    document.getElementById("ascr").value=decodeURIComponent(sc);
    document.getElementById("afh").textContent="✏️ Edit Ad";
    document.getElementById("acan").style.display="block";
    document.querySelector(".adfb").scrollIntoView({behavior:"smooth"});
  };
  window.aDel = async id => {
    if(!confirm("Delete?")) return;
    await adminApi(`/api/admin/ads/${id}`,{method:"DELETE"},apw);
    toast("Deleted"); loadAdmTab();
  };
}

async function admWd(el) {
  const list = await adminApi("/api/admin/withdrawals",{},apw);
  el.innerHTML = `<div class="tbl"><table>
    <thead><tr><th>User ID</th><th>Method</th><th>Account</th><th>Amount</th><th>Status</th><th>Date</th><th>Action</th></tr></thead>
    <tbody>${list.length===0?`<tr><td colspan="7" style="text-align:center;color:var(--dim);padding:24px">No requests yet.</td></tr>`:
      list.map(w=>`<tr>
        <td>${w.userId}</td><td>${w.method}</td>
        <td style="font-size:.73rem;max-width:130px;word-break:break-all">${w.account}</td>
        <td>$${w.amount}</td>
        <td><span class="badge b-${w.status}">${w.status}</span></td>
        <td>${(w.createdAt||"").slice(0,10)}</td>
        <td>${w.status==="pending"?`
          <div class="row-acts">
            <button class="bs bs-g" onclick="wUpd('${w.id}','completed')">✅ Pay</button>
            <button class="bs bs-r" onclick="wUpd('${w.id}','rejected')">✕ Reject</button>
          </div>`:"-"}</td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
  window.wUpd = async (id,st) => {
    await adminApi(`/api/admin/withdrawals/${id}`,{method:"PUT",body:{status:st}},apw);
    toast(st==="completed"?"✅ Marked paid!":"Rejected");
    loadAdmTab();
  };
}
</script>
</body>
</html>
